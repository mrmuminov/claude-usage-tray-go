name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: claude-tray-go-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: claude-tray-go-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: claude-tray-go-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y --fix-missing libayatana-appindicator3-dev gcc

      - name: Build (Linux/macOS)
        if: matrix.goos != 'windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -ldflags="-X main.Version=${{ github.ref_name }}" -o ${{ matrix.artifact }} .

      - name: Build (Windows)
        if: matrix.goos == 'windows'
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -ldflags="-X main.Version=${{ github.ref_name }}" -o ${{ matrix.artifact }} .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/checkout@v4
        with:
          sparse-checkout: install.ps1

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
            install.ps1
